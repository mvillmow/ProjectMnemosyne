name: Validate Plugins

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Validate flat-format skill files
        run: python3 scripts/validate_plugins.py

      - name: Type check
        run: mypy scripts/ --ignore-missing-imports

      - name: Run test suite
        run: pytest tests/ -v

      - name: Check skill template validity
        run: |
          echo "Checking template structure..."
          if [ ! -f "templates/skill-template.md" ]; then
            echo "ERROR: Template skill-template.md missing"
            exit 1
          fi
          echo "Template structure valid"
