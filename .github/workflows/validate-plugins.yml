name: Validate Plugins

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Validate flat-format skill files
        run: python3 scripts/validate_plugins.py

      - name: Type check
        run: mypy scripts/ --ignore-missing-imports

      - name: Run test suite
        run: pytest tests/ -v

      - name: Check skill template validity
        run: |
          echo "Checking template structure..."
          if [ ! -f "templates/skill-template.md" ]; then
            echo "ERROR: Template skill-template.md missing"
            exit 1
          fi
          echo "Template structure valid"
