name: Update Marketplace

on:
  schedule:
    # Weekly, Sunday 00:00 UTC — regenerates marketplace.json on a cadence so it
    # self-heals even when individual merges don't trigger a regeneration.
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate marketplace.json
        run: python3 scripts/generate_marketplace.py .claude-plugin/marketplace.json

      - name: Validate skills
        run: python3 scripts/validate_plugins.py

      - name: Run tests
        run: python3 -m pytest tests/ -v

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet .claude-plugin/marketplace.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Opens a PR for human review — intentionally NOT auto-merged (fixes #1463).
      # A maintainer must review and merge this PR manually.
      - name: Open PR with updated marketplace.json
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-marketplace
          commit-message: "chore: update marketplace.json [skip ci]"
          title: "chore: update marketplace.json"
          body: |
            Automated update of `.claude-plugin/marketplace.json` generated by the Update Marketplace workflow.

            **This PR requires human review before merging** — auto-merge has been removed (see #1463).
          labels: automated
