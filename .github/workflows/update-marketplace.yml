name: Update Marketplace

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'plugins/**'
      - '!.claude-plugin/marketplace.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate marketplace.json
        run: python3 scripts/generate_marketplace.py .claude-plugin/marketplace.json

      - name: Validate skills
        run: python3 scripts/validate_plugins.py

      - name: Run tests
        run: python3 -m pytest tests/ -v

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet .claude-plugin/marketplace.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Opens a PR for human review — intentionally NOT auto-merged (fixes #1463).
      # A maintainer must review and merge this PR manually.
      - name: Open PR with updated marketplace.json
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-marketplace
          commit-message: "chore: update marketplace.json [skip ci]"
          title: "chore: update marketplace.json"
          body: |
            Automated update of `.claude-plugin/marketplace.json` generated by the Update Marketplace workflow.

            **This PR requires human review before merging** — auto-merge has been removed (see #1463).
          labels: automated
