name: Required Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: required-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            msg='Found "continue-on-error: true" above. Fix root cause per HomericIntelligence/Odysseus#280.'
            echo "::error::${msg}"
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
      - name: Install yamllint
        run: pip install yamllint
      - name: yamllint on workflow YAML
        run: yamllint -c .yamllint.yaml .github/workflows/
      - name: Validate marketplace.json is parseable
        run: jq . .claude-plugin/marketplace.json > /dev/null
      - name: Install mypy and dependencies
        run: |
          pip install mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Run mypy
        run: |
          if [ -d scripts ] || [ -d tests ]; then
            python -m mypy
          else
            echo "::notice::No scripts/ or tests/ directory — skipping mypy"
          fi
      - name: Run direct PII pattern check
        run: python3 scripts/check_pii.py

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v20.0.0
        with:
          globs: |
            **/*.md
            !.claude/**
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.67.2
          cache: false
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::notice::pixi.toml present but pixi.lock missing — running unlocked (tracked in #1464)"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run plugin validation script
        run: python3 scripts/validate_plugins.py
      - name: Run test suite
        run: pytest tests/ -v

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Validate marketplace.json has plugins
        run: jq 'keys | length > 0' .claude-plugin/marketplace.json
      - name: Validate marketplace.json via python json.tool
        run: python -m json.tool .claude-plugin/marketplace.json > /dev/null
      - name: Validate plugin.json structure
        run: jq 'keys | length > 0' .claude-plugin/plugin.json
      - name: Cross-check plugin count
        run: |
          declared=$(jq '.total_plugins' .claude-plugin/marketplace.json)
          actual=$(jq '.plugins | length' .claude-plugin/marketplace.json)
          echo "Declared: $declared, Actual: $actual"
          [ "$declared" -eq "$actual" ] || { echo "Plugin count mismatch"; exit 1; }

  # Canonical aggregate test gate (ci-naming-convention.md). Surfaces a single
  # `test` check-run that fails if either split suite fails. The split
  # unit-tests / integration-tests sub-checks are KEPT.
  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [unit-tests, integration-tests]
    steps:
      - name: Aggregate test result
        run: echo "All test suites (unit-tests, integration-tests) passed."

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
      - name: Run pip-audit
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit --requirement requirements.txt
          else
            pip-audit
          fi

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v8.30.1 \
            --repo gitleaks/gitleaks \
            --pattern "gitleaks_8.30.1_linux_x64.tar.gz" \
            --output /tmp/gitleaks.tar.gz
          tar -xz -C /usr/local/bin -f /tmp/gitleaks.tar.gz gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          fi

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Count skill files
        run: |
          count=$(find . -name "*.md" -path "*/skills/*" | wc -l)
          echo "Total skill files: $count"
          [ "$count" -gt 0 ] || { echo "No skill files found"; exit 1; }
      - name: Validate marketplace.json structure
        run: jq . .claude-plugin/marketplace.json > /dev/null
      - name: Validate all JSON files are parseable
        run: |
          find . -name "*.json" -not -path "*/.git/*" | while read f; do
            jq . "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
          done
          echo "All JSON files valid"

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
      - name: Install check-jsonschema
        run: pip install check-jsonschema
      - name: Validate workflow YAML files against GitHub schema
        run: |
          # Use the built-in GitHub Actions schema bundled with check-jsonschema
          # to avoid transient 503 failures fetching from json.schemastore.org
          check-jsonschema \
            --builtin-schema vendor.github-workflows \
            .github/workflows/*.yml

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check marketplace plugin versions are valid semver
        run: |
          set -euo pipefail
          bad=$(jq -r '
            [.plugins[]
              | select((.version // "") | test("^[0-9]+\\.[0-9]+\\.[0-9]+$") | not)
              | .name + "=" + (.version // "<missing>")]
            | .[]' .claude-plugin/marketplace.json)
          if [ -n "$bad" ]; then
            echo "::error::Plugins with non-semver versions:"
            printf '%s\n' "$bad"
            exit 1
          fi
          echo "Version format check complete"
      - name: Validate marketplace version field is present on all plugins
        run: |
          bad=$(jq '[.plugins[] | select(.version == null or .version == "")] | length' \
            .claude-plugin/marketplace.json)
          echo "Plugins missing version: $bad"
          [ "$bad" -eq 0 ] || { echo "Some plugins are missing version fields"; exit 1; }
      - name: Cross-check top-level schema version
        run: jq -e '.version' .claude-plugin/marketplace.json > /dev/null
